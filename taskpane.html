<!doctype html><html><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"><title>Khmer Editor Task Pane</title><script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script><link href="6b9b7065a1172caf8740.css" rel="stylesheet"/><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script></head><body class="ms-Fabric"><header class="app-header"><div class="logo-container"><img src="assets/logo-filled.png" alt="Logo" class="app-logo" onerror='this.src="https://cdn-icons-png.flaticon.com/512/8085/8085444.png"'/><h1 class="app-title">Khmer Editor</h1></div><p class="app-description">កម្មវិធីជំនួយពិនិត្យអក្ខរាវិរុទ្ធ និងវេយ្យាករណ៍ខ្មែរ</p></header><main class="app-main"><div id="activation-screen" style="padding:20px;text-align:center;display:flex;flex-direction:column;align-items:center"><div style="background:#333;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:15px;font-weight:700">Logo</div><h3 style="color:#107c10;margin-bottom:5px">សូមធ្វើការបើកសិទ្ធប្រើប្រាស់</h3><p style="font-size:11px;color:#666;margin-bottom:15px">សូមផ្ញើលេខកូដសម្គាល់ខាងក្រោមទៅកាន់អ្នកបច្ចេកទេស</p><input id="machineId" readonly="readonly" style="width:88%;padding:10px;border:1px dashed #0078d4;background:#f3f2f1;text-align:center;font-family:monospace;font-weight:700;margin-bottom:15px"> <input id="licenseKey" placeholder="បញ្ចូលលេខកូដកាបើកសិទ្ធ (Activation Key)" style="width:88%;padding:12px;margin-bottom:12px;border:1px solid #ced4da;border-radius:4px"> <button id="activateBtn" style="width:90%;background:#107c10;color:#fff;border:none;padding:12px;border-radius:4px;font-weight:700;cursor:pointer">Activate</button><p id="activation-message" style="color:#d83b01;font-size:12px;margin-top:10px;font-weight:700"></p><p style="font-size:11px;margin-top:15px;color:#0078d4">Contact: @kimaun (Telegram)</p></div><div id="app-content" style="display:none"><div class="button-group"><button id="run" class="primary-btn"><span>🔍 ពិនិត្យអត្ថបទ</span></button></div><div class="toggle-container"><label class="switch"><input type="checkbox" id="smart-scan-toggle"> <span class="slider round"></span></label><div class="toggle-text"><span class="toggle-title">Smart Scanning</span> <span class="toggle-subtitle">Auto-check as you type</span></div></div><div id="highlight-controls" style="display:none;justify-content:space-between;gap:10px;margin-top:15px;margin-bottom:10px;padding:10px;background:#fff;border-radius:6px;box-shadow:0 2px 4px rgba(0,0,0,.05);border:1px solid #edebe9"><button id="btn-show-color" disabled="disabled" style="flex:1;padding:8px;border-radius:4px;border:1px solid #107c10;background:#e0f0e0;color:#107c10;font-weight:700;cursor:not-allowed">បង្ហាញព៌ណ</button> <button id="btn-hide-color" style="flex:1;padding:8px;border-radius:4px;border:1px solid #ccc;background:#fff;color:#666;cursor:pointer;transition:.2s">មិនបង្ហាញព៌ណ</button></div><div id="error-list" class="error-list"><div id="error-list" class="error-list"><p style="text-align:center;color:#888;font-size:12px;margin-top:20px">ចុច "ពិនិត្យអត្ថបទ" ដើម្បីចាប់ផ្តើម</p></div></div></div></main><footer class="app-footer"><p>ជំនួយបច្ចេកទេស: <a href="https://t.me/kimaun" target="_blank">@kimaun (Telegram)</a></p></footer></body></html>
